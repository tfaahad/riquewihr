<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>...</title>
 <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: #0f1115;
    color: #e6eaf2;
  }

  .chat-container {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(180deg, #141822, #0d111a);
    display: flex;
    flex-direction: column;
  }

  .chat-header {
  background-color: #141822;
  padding: 15px;
  color: #e6eaf2;
  font-size: 18px;
  font-weight: bold;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid #22293a;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

  .messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #0f1115;
  }

  .message {
    max-width: 75%;
    padding: 10px 15px;
    border-radius: 20px;
    word-wrap: break-word;
    font-size: 15px;
    flex: 0 0 auto;
    width: fit-content;
    overflow-wrap: break-word;
  }

  .sent {
    align-self: flex-end;
    background-color: #1e2a44;
    color: #e6eaf2;
    border-bottom-right-radius: 0;
    border: 1px solid #2a3954;
  }

  .received {
    align-self: flex-start;
    background-color: #1b2333;
    color: #e6eaf2;
    border-bottom-left-radius: 0;
    border: 1px solid #1f2a3e;
  }

  .chat-input {
    display: flex;
    border-top: 1px solid #22293a;
    position: sticky;
    bottom: 0;
    z-index: 10;
    background-color: #141822;
  }

  #messageInput {
    flex: 1;
    padding: 10px;
    border: none;
    font-size: 16px;
    outline: none;
    background: #0f141d;
    color: #e6eaf2;
  }

  button {
    padding: 10px 20px;
    background-color: #5b8cff;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.3s;
  }

  input#messageInput {
    font-size: 16px; /* avoid zoom on mobile */
    min-height: 48px; /* easier to tap */
  }

  button {
    min-height: 48px;
    border-radius: 8px;
  }

  button:hover {
    background-color: #4674e9;
  }


.timestamp {
  display: none;
  font-size: 11px;
  color: #aaa;
  margin-top: 4px;
  text-align: right;
}

.timestamp.show {
  display: block;
}

/* Enhanced reaction styles */
.reactions {
  margin-top: 4px;
  display: flex;
  gap: 4px;
  font-size: 16px;
  flex-wrap: wrap;
}

.reactions span {
  transition: all 0.2s ease;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.1);
}

.reactions span:hover {
  transform: scale(1.15);
  background: rgba(255, 255, 255, 0.2);
}

.reactions span.user-reaction {
  outline: 1.5px solid #5b8cff;
  background: rgba(91, 140, 255, 0.2);
}

@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

.reactions span.added {
  animation: popIn 0.3s ease;
}

/* Improved emoji picker — now centered */
.emoji-picker {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
  z-index: 1000;
  background: transparent;   /* no background */
  border: none;              /* no border */
  box-shadow: none;          /* remove shadow */
  padding: 0;
}

.emoji-picker span {
  font-size: 28px;           /* bigger, like WhatsApp */
  cursor: pointer;
  transition: transform 0.2s;
}

.emoji-picker span:hover {
  transform: scale(1.3);
}

.emoji-picker button {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 20px;
  padding: 6px;
  border-radius: 8px;
  transition: all 0.2s ease;
}

.emoji-picker button:hover,
.emoji-picker button:focus {
  transform: scale(1.3);
  background: rgba(255, 255, 255, 0.1);
  outline: none;
}


#activeIndicator {
  transition: all 0.2s ease;
  font-size: 20px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

#activeIndicator.active {
  text-shadow: 0 0 8px #5b8cff;
  animation: pulseGlow 1.5s ease-in-out infinite;
}



@keyframes pulseGlow {
  0%, 100% {
    text-shadow: 0 0 0px #5b8cff;
    opacity: 1;
  }
  50% {
    text-shadow: 0 0 12px #5b8cff;
    opacity: 0.8;
  }
}

@keyframes fadePulse {
  0%, 100% {
    opacity: 0.6;
  }
  50% {
    opacity: 1;
  }
}

/* Typing glow - orange pulse */
#activeIndicator.typing-glow {
  text-shadow: 0 0 16px #ffa500;
  animation: typingPulse 0.8s ease-in-out infinite;
}

@keyframes typingPulse {
  0%, 100% {
    text-shadow: 0 0 0px #ffa500;
    opacity: 0.6;
  }
  50% {
    text-shadow: 0 0 18px #ffa500;
    opacity: 1;
  }
}


</style>

</head>
<body>
  <div class="chat-container">
   <div class="chat-header">
  <span id="activeIndicator">💬</span>
</div>
<div class="messages" id="messages"></div>
    <form class="chat-input" id="form">
      <input id="messageInput" autocomplete="off" placeholder="Enter your text..." />
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io({
    reconnection: true,
    reconnectionAttempts: 5
  });

  const form = document.getElementById('form');
  const input = document.getElementById('messageInput');
  const messages = document.getElementById('messages');
  const activeIndicator = document.getElementById('activeIndicator');
  

  let username = localStorage.getItem("username");

  if (!username) {
    username = prompt("Enter your name")?.trim() || "User";
    localStorage.setItem("username", username);
  }
  
  // Emit username to server AFTER socket is connected
  socket.on('connect', () => {
    socket.emit('set username', username);
  });
  
  const EMOJIS = ['❤️','🙄','😂','😔','😢','😭'];
  let pickerEl = null;
  let typingTimeout = null;
  let isTyping = false;

  // Typing indicator logic
  input.addEventListener('input', () => {
    if (!isTyping && input.value.trim().length > 0) {
      isTyping = true;
      socket.emit('typing:start', { user: username });
    }
    
    if (typingTimeout) clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      if (isTyping) {
        isTyping = false;
        socket.emit('typing:stop', { user: username });
      }
    }, 1000);
  });

  input.addEventListener('blur', () => {
    if (isTyping) {
      isTyping = false;
      socket.emit('typing:stop', { user: username });
    }
  });

  function addMessage(msg) {
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('message');
    msgDiv.classList.add(msg.name === username ? 'sent' : 'received');
    msgDiv.dataset.id = msg._id;

    const contentDiv = document.createElement('div');
    contentDiv.style.display = 'flex';
    contentDiv.style.flexDirection = 'column';
    
    // Add name for received messages (optional - helps identify who is typing)
    if (msg.name !== username) {
      const nameSpan = document.createElement('div');
      nameSpan.textContent = msg.name;
      nameSpan.style.fontSize = '12px';
      nameSpan.style.fontWeight = 'bold';
      nameSpan.style.color = '#5b8cff';
      nameSpan.style.marginBottom = '4px';
      contentDiv.appendChild(nameSpan);
    }
    
    const textNode = document.createElement('div');
    textNode.textContent = msg.text;
    textNode.style.marginBottom = '4px';
    contentDiv.appendChild(textNode);

        const timeSpan = document.createElement('div');
    timeSpan.classList.add('timestamp');
    const date = new Date(msg.timestamp || Date.now());
    
    // Store both time and date
    const timeOptions = { hour: 'numeric', minute: 'numeric', hour12: true };
    const timeString = date.toLocaleTimeString([], timeOptions);
    
    const dateOptions = { month: 'short', day: 'numeric', year: 'numeric' };
    const dateString = date.toLocaleDateString([], dateOptions);
    
    // Initially show only time
    timeSpan.textContent = timeString;
    timeSpan.dataset.fullTimestamp = `${timeString} • ${dateString}`;
    contentDiv.appendChild(timeSpan);

    const reactionsDiv = document.createElement('div');
    reactionsDiv.classList.add('reactions');
    contentDiv.appendChild(reactionsDiv);

    msgDiv.appendChild(contentDiv);

        msgDiv.addEventListener('click', (e) => {
      if (!e.target.closest('.reactions')) {
        if (timeSpan.classList.contains('show')) {
          // If showing, revert to just time
          timeSpan.textContent = timeString;
          timeSpan.classList.remove('show');
        } else {
          // If hidden, show full date and time
          timeSpan.textContent = timeSpan.dataset.fullTimestamp;
          timeSpan.classList.add('show');
        }
      }
    });

    msgDiv.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      showEmojiPicker(e.pageX, e.pageY, msg._id);
    });

    let pressTimer;
    msgDiv.addEventListener('touchstart', (e) => {
      pressTimer = setTimeout(() => {
        e.preventDefault();
        const touch = e.touches[0];
        showEmojiPicker(touch.clientX, touch.clientY, msg._id);
      }, 500);
    });

    msgDiv.addEventListener('touchend', () => {
      clearTimeout(pressTimer);
    });

    msgDiv.addEventListener('touchmove', () => {
      clearTimeout(pressTimer);
    });

    if (msg.reactions) {
      renderReactions(msg._id, msg.reactions);
    }

    messages.appendChild(msgDiv);
    messages.scrollTop = messages.scrollHeight;
  }

  function showEmojiPicker(x, y, messageId) {
    if (pickerEl) pickerEl.remove();

    pickerEl = document.createElement('div');
    pickerEl.classList.add('emoji-picker');
    
    EMOJIS.forEach(emoji => {
      const btn = document.createElement('button');
      btn.textContent = emoji;
      btn.setAttribute('aria-label', `React with ${emoji}`);
      btn.onclick = () => {
        socket.emit('reaction:set', { messageId, user: username, emoji }, (res) => {
          if (!res.ok) console.error("Failed to react:", res.error);
        });
        pickerEl.remove();
        pickerEl = null;
      };
      pickerEl.appendChild(btn);
    });

    document.body.appendChild(pickerEl);
    
    setTimeout(() => {
      document.addEventListener('click', closeAllPickers, { once: true });
    }, 0);
    
    pickerEl.addEventListener('keydown', (e) => {
      const buttons = pickerEl.querySelectorAll('button');
      const currentIndex = Array.from(buttons).indexOf(document.activeElement);
      
      if (e.key === 'ArrowRight') {
        buttons[Math.min(currentIndex + 1, buttons.length - 1)]?.focus();
      } else if (e.key === 'ArrowLeft') {
        buttons[Math.max(currentIndex - 1, 0)]?.focus();
      } else if (e.key === 'Escape') {
        closeAllPickers();
      }
    });

    setTimeout(() => {
      const firstButton = pickerEl.querySelector('button');
      if (firstButton) firstButton.focus();
    }, 0);
  }

  function renderReactions(messageId, reactions) {
    const msgDiv = document.querySelector(`.message[data-id="${messageId}"]`);
    if (!msgDiv) return;
    const reactionsDiv = msgDiv.querySelector('.reactions');
    reactionsDiv.innerHTML = '';

    const counts = {};
    for (const [user, emoji] of Object.entries(reactions)) {
      counts[emoji] = (counts[emoji] || 0) + 1;
    }

    Object.entries(counts).forEach(([emoji, count]) => {
      const span = document.createElement('span');
      span.textContent = count > 1 ? `${emoji} ${count}` : emoji;
      
      if (reactions[username] === emoji) {
        span.classList.add('user-reaction');
      }
      
      span.classList.add('added');
      setTimeout(() => span.classList.remove('added'), 300);
      
      if (reactions[username] === emoji) {
        span.onclick = (e) => {
          e.stopPropagation();
          socket.emit('reaction:clear', { messageId, user: username }, (res) => {
            if (!res.ok) console.error("Failed to remove reaction:", res.error);
          });
        };
      } else {
        span.onclick = (e) => {
          e.stopPropagation();
          socket.emit('reaction:set', { messageId, user: username, emoji }, (res) => {
            if (!res.ok) console.error("Failed to react:", res.error);
          });
        };
      }
      
      reactionsDiv.appendChild(span);
    });
  }

  function closeAllPickers() {
    if (pickerEl) {
      pickerEl.remove();
      pickerEl = null;
    }
  }

  // Active users tracking - just 💭 with blue glow when multiple people
  let activeUsers = new Set();
  let typingGlowTimeout = null;
  
socket.on('active:users', (users) => {
  activeUsers = new Set(users);
  
  // Show 💬 when alone, 💭 when multiple people
  if (activeUsers.size > 1) {
    activeIndicator.innerHTML = '💭';
  } else {
    activeIndicator.innerHTML = '💬';
  }
  
  // Add blue glow when multiple people online (but don't override typing glow)
  if (activeUsers.size > 1 && !activeIndicator.classList.contains('typing-glow')) {
    activeIndicator.classList.add('active');
  } else if (activeUsers.size <= 1 && !activeIndicator.classList.contains('typing-glow')) {
    activeIndicator.classList.remove('active');
  }
});

  // Typing indicators - make 💭 glow orange when others type
  let typingUsers = new Set();
  
  socket.on('typing:start', ({ user }) => {
    if (user !== username) {
      typingUsers.add(user);
      
      // Remove blue active glow if present, add orange typing glow
      activeIndicator.classList.remove('active');
      activeIndicator.classList.add('typing-glow');
      
      // Clear existing timeout
      if (typingGlowTimeout) clearTimeout(typingGlowTimeout);
    }
  });
  
  socket.on('typing:stop', ({ user }) => {
    typingUsers.delete(user);
    
    // If no one is typing anymore
    if (typingUsers.size === 0) {
      activeIndicator.classList.remove('typing-glow');
      
      // Re-add blue glow if multiple people are online
      if (activeUsers.size > 1) {
        activeIndicator.classList.add('active');
      }
      
      if (typingGlowTimeout) clearTimeout(typingGlowTimeout);
    } else {
      // Set timeout to remove glow after 1.5 seconds of no typing events
      typingGlowTimeout = setTimeout(() => {
        if (typingUsers.size === 0) {
          activeIndicator.classList.remove('typing-glow');
          if (activeUsers.size > 1) {
            activeIndicator.classList.add('active');
          }
        }
      }, 1500);
    }
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if (message) {
      // Stop typing indicator when sending
      if (isTyping) {
        socket.emit('typing:stop', { user: username });
        isTyping = false;
        if (typingTimeout) clearTimeout(typingTimeout);
      }
      socket.emit('chat message', { 
        name: username, 
        text: message 
      });
      input.value = '';
    }
  });

  let oldestTimestamp = null;
  let loading = false;

  socket.on('previous messages', (msgs) => {
    messages.innerHTML = '';
    msgs.forEach(msg => {
      msg.reactions = msg.reactions ? Object.fromEntries(Object.entries(msg.reactions)) : {};
      addMessage(msg);
    });
    if (msgs.length > 0) {
      oldestTimestamp = msgs[0].timestamp;
    }
  });

  messages.addEventListener('scroll', async () => {
    if (messages.scrollTop === 0 && !loading && oldestTimestamp) {
      loading = true;
      try {
        const res = await fetch(`/messages?before=${oldestTimestamp}&limit=50`);
        const olderMessages = await res.json();
        if (olderMessages.length > 0) {
          const prevHeight = messages.scrollHeight;
          olderMessages.forEach(msg => {
            addMessage(msg);
          });
          oldestTimestamp = olderMessages[0].timestamp;
          messages.scrollTop = messages.scrollHeight - prevHeight;
        }
      } catch (err) {
        console.error("Error fetching older messages:", err);
      }
      loading = false;
    }
  });

  socket.on('chat message', (msg) => {
    addMessage(msg);
  });

  socket.onAny((event, ...args) => {
    console.log('Socket event:', event, args);
  });

  socket.on('reaction:updated', ({ messageId, reactions }) => {
    renderReactions(messageId, reactions);
  });

  document.addEventListener('click', (e) => {
    if (pickerEl && !pickerEl.contains(e.target)) {
      closeAllPickers();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && pickerEl) {
      closeAllPickers();
    }
  });
</script>

</body>
</html>
